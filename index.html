<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cube</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scene">
    <div class="cube" id="cube">
      <div class="face front"><span>WORD ONE</span></div>
      <div class="face back"><span>WORD TWO</span></div>
      <div class="face left"><span>WORD THREE</span></div>
      <div class="face right"><span>WORD FOUR</span></div>
      <div class="face top"><span>WORD FIVE</span></div>
      <div class="face bottom"><span>WORD SIX</span></div>
    </div>
  </div>

  <p class="hint">Click &amp; drag to rotate</p>

  <script src="script.js"></script>
</body>
</html>
